<!DOCTYPE html>
<html>
<body>
    <img id="sourceImg" src="./preview-image.png" crossorigin="anonymous" style="display:none;">
    <canvas id="canvas"></canvas>
    <script>
        const img = document.getElementById('sourceImg');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        img.onload = function() {
            // 设置画布尺寸与图片一致
            canvas.width = img.width;
            canvas.height = img.height;
            // 绘制原图
            ctx.drawImage(img, 0, 0);
            // 获取像素数据
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data; // 一维数组 [r,g,b,a, r,g,b,a, ...]

            // 遍历每个像素（每4个值代表一个像素）
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                // 判断是否为灰色（R=G=B）或接近灰色（允许一定阈值）
                const threshold = 30; // 容忍度，可根据需求调整
                if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) {
                    // 白色
                    data[i] = 86;     // R
                    data[i + 1] = 121;   // G
                    data[i + 2] = 163;   // B
                } else if (data[i] > 10 && data[i+1] > 10 && data[i+2] > 10) {
                    // 灰色
                    data[i] = 17;     // R
                    data[i + 1] = 43;   // G
                    data[i + 2] = 77;   // B
                    // data[i+3] 透明度保持不变 
                } else {
                    data[i] = 7;     // R
                    data[i + 1] = 10;   // G
                    data[i + 2] = 13;   // B
                }
            }

            // 将修改后的数据放回 Ca  nvas
            ctx.putImageData(imageData, 0, 0);
            // 此时 Canvas 上显示的就是替换后的图片
            // 可以保存为新的 PNG： canvas.toDataURL('image/png')
        };

        // 如果图片已经加载完成（例如缓存），手动触发
        if (img.complete) img.onload();
    </script>
</body>
</html>
