<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapLibre 南充 3D 演示（离线瓦片）</title>
    <!-- 引入 MapLibre -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        .info {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 6px 18px;
            border-radius: 20px; font-size: 14px; z-index: 1000;
            pointer-events: none; font-family: sans-serif;
        }
        .maplibregl-control-container {
            display: none; /* 确保版权控件可见 */
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <!-- <div class="info">MapLibre · 南充市 3D 立体建筑（离线瓦片）</div> -->
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'offline-raster': {
                        type: 'raster',
                        // ★★★ 关键修改：将 URL 指向您的本地瓦片路径 ★★★
                        // 支持相对路径（如 './offline_tiles/{z}/{x}/{y}.png'）
                        // 也支持绝对路径（如 'http://localhost:8080/tiles/{z}/{x}/{y}.png'）
                        tiles: ['./new/latest/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        // attribution: '', // 离线地图的 attribution 为空字符串
                    },
                },
                layers: [{
                    id: 'offline-layer',
                    type: 'raster',
                    source: 'offline-raster',
                    // 可设置最大最小缩放级别，与您的瓦片范围匹配
                    minzoom: 15,
                    maxzoom: 19,
                }],
            },
            center: [106.03655278081857, 30.7478613352993],
            zoom: 17,
            pitch: 65,    // 俯仰角 60°
            bearing:  0,  // 旋转 30°
        });

        map.on('load', () => {
            // map.addControl(new maplibregl.NavigationControl(), 'top-left');
            map.addControl(new maplibregl.AttributionControl({
                compact: false // 根据需要设置，false 表示扩展模式
            }));

            // ---------- 生成模拟的 3D 建筑（在南充市区随机分布） ----------
            const buildings = [];
            const offsets = [
                { lng: 0.01, lat: 0.01, h: 80 },
                { lng: -0.015, lat: 0.008, h: 120 },
                { lng: 0.008, lat: -0.012, h: 60 },
                { lng: -0.02, lat: -0.015, h: 100 },
                { lng: 0.02, lat: -0.005, h: 90 },
                { lng: -0.005, lat: 0.02, h: 70 },
            ];
            const baseLon = 106.03655278081857;
            const baseLat = 30.7478613352993;
            offsets.forEach((o) => {
                const lon = baseLon + o.lng;
                const lat = baseLat + o.lat;
                const size = 0.003;
                const coords = [
                    [lon - size, lat - size],
                    [lon + size, lat - size],
                    [lon + size, lat + size],
                    [lon - size, lat + size],
                    [lon - size, lat - size],
                ];
                buildings.push({
                    type: 'Feature',
                    geometry: { type: 'Polygon', coordinates: [coords] },
                    properties: { height: o.h, min_height: 0 },
                });
            });

            map.addSource('buildings', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: buildings },
            });

            map.addLayer({
                id: '3d-buildings',
                type: 'fill-extrusion',
                source: 'buildings',
                paint: {
                    'fill-extrusion-color': '#3b8fc2',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.85,
                },
            });

            map.addLayer({
                id: 'buildings-outline',
                type: 'fill-extrusion',
                source: 'buildings',
                paint: {
                    'fill-extrusion-color': '#ffffff',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.2,
                },
            });

            // 添加一个中心标记
            // new maplibregl.Marker({ color: '#ff4d4d' })
            //     .setLngLat([106.03655278081857, 30.7478613352993])
            //     .addTo(map);
        });
    </script>
</body>
</html>
