<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet离线地图 - 16:9宽高比</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 30px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        backdrop-filter: blur(5px);
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }

      .description {
        font-size: 1.1rem;
        max-width: 800px;
        margin: 0 auto;
        line-height: 1.6;
      }

      .map-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* 16:9 宽高比 (9/16 = 0.5625) */
        background-color: #2c3e50;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        margin-bottom: 30px;
      }

      #map {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 15px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      button {
        padding: 12px 25px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
      }

      button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      button.active {
        background: rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }

      .info-panel {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        border-radius: 10px;
        margin-top: 20px;
        backdrop-filter: blur(5px);
      }

      .info-panel h2 {
        margin-bottom: 15px;
        text-align: center;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
      }

      .feature {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 8px;
      }

      .feature h3 {
        margin-bottom: 10px;
        color: #fdbb2d;
      }

      footer {
        margin-top: 30px;
        text-align: center;
        padding: 20px;
        font-size: 0.9rem;
        opacity: 0.8;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .description {
          font-size: 1rem;
        }

        .controls {
          flex-direction: column;
          align-items: center;
        }

        button {
          width: 100%;
          max-width: 300px;
        }
      }

      /* 绘制状态指示器 */
      .drawing-status {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 15px;
        border-radius: 5px;
        z-index: 1000;
        font-size: 14px;
      }

      .drawing-status.active {
        background: rgba(46, 204, 113, 0.7);
      }

      /* 点信息面板 */
      .points-panel {
        position: absolute;
        top: 50px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        border-radius: 5px;
        z-index: 1000;
        max-width: 250px;
        max-height: 300px;
        overflow-y: auto;
      }

      .point-item {
        background: rgba(255, 255, 255, 0.1);
        padding: 8px;
        margin-bottom: 5px;
        border-radius: 3px;
        font-size: 12px;
      }

      .point-number {
        display: inline-block;
        width: 20px;
        height: 20px;
        background: #e74c3c;
        border-radius: 50%;
        text-align: center;
        line-height: 20px;
        margin-right: 8px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Leaflet离线地图展示</h1>
        <p class="description">
          此页面展示了一个使用Leaflet加载的离线地图，地图容器始终保持16:9的宽高比，并占据整个div区域。您可以缩放、平移地图进行交互。
        </p>
      </header>

      <div class="map-container">
        <div id="map"></div>
        <div class="drawing-status" id="drawingStatus">绘制模式: 关闭</div>
        <div class="points-panel" id="pointsPanel" style="display: none;">
          <h4 style="margin-bottom: 10px; text-align: center;">标记点列表</h4>
          <div id="pointsList"></div>
        </div>
      </div>

      <div class="controls">
        <button id="toggle-drawing">开始绘制</button>
        <button id="zoom-in">放大</button>
        <button id="zoom-out">缩小</button>
        <button id="reset-view">重置视图</button>
        <button id="clear-points">清除标记</button>
        <button id="toggle-satellite">切换地图样式</button>
      </div>

      <div class="info-panel">
        <h2>功能特性</h2>
        <div class="features">
          <div class="feature">
            <h3>16:9宽高比</h3>
            <p>地图容器始终保持16:9的宽高比，适应不同屏幕尺寸。</p>
          </div>
          <div class="feature">
            <h3>离线地图</h3>
            <p>使用离线地图瓦片，无需网络连接即可查看地图。</p>
          </div>
          <div class="feature">
            <h3>点击绘制</h3>
            <p>点击地图添加标记点，自动连线形成路径。</p>
          </div>
          <div class="feature">
            <h3>交互控制</h3>
            <p>提供缩放、平移和地图样式切换功能。</p>
          </div>
        </div>
      </div>

      <footer>
        <p>© 2023 Leaflet离线地图演示 | 使用Leaflet.js库</p>
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // 初始化地图
      const map = L.map("map", {
        center: [30.745482638228058, 106.03737831115724],
        zoom: 15,
        zoomControl: false
      });

      // 添加离线地图图层
      const osmLayer = L.tileLayer("./black/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18
      }).addTo(map);

      // 添加卫星图层选项
      const satelliteLayer = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          attribution:
            "Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community",
          maxZoom: 18
        }
      );

      // 当前图层状态
      let isSatellite = false;

      // 绘制相关变量
      let isDrawing = false;
      let markers = [];
      let polylines = [];
      let points = [];

      // DOM元素
      const toggleDrawingBtn = document.getElementById("toggle-drawing");
      const drawingStatus = document.getElementById("drawingStatus");
      const pointsPanel = document.getElementById("pointsPanel");
      const pointsList = document.getElementById("pointsList");
      const clearPointsBtn = document.getElementById("clear-points");

      // 添加标记示例
      const marker = L.marker([30.745482638228058, 106.03737831115724]).addTo(
        map
      );
      marker.bindPopup("<b>南充</b><br>中国西部").openPopup();

      // 地图点击事件
      map.on("click", function(e) {
        if (!isDrawing) return;

        addPoint(e.latlng);
      });

      // 添加点函数
      function addPoint(latlng) {
        const pointNumber = points.length + 1;

        // 创建主标记
        const marker = L.marker(latlng).addTo(map);

        // 创建编号标记
        const numberIcon = L.divIcon({
          html: `<div style="background-color: #e74c3c; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white;">${pointNumber}</div>`,
          className: "number-icon",
          iconSize: [24, 24],
          iconAnchor: [12, 12]
        });

        const numberMarker = L.marker(latlng, {
          icon: numberIcon,
          zIndexOffset: 1000
        }).addTo(map);

        // 绑定弹出窗口
        marker.bindPopup(`
          <b>标记点 ${pointNumber}</b><br>
          纬度: ${latlng.lat.toFixed(6)}<br>
          经度: ${latlng.lng.toFixed(6)}<br>
          <button onclick="removePoint(${
            points.length
          })" style="margin-top: 5px; padding: 5px 10px; background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer;">删除此点</button>
        `);

        // 保存点数据
        points.push(latlng);
        markers.push({
          main: marker,
          number: numberMarker
        });

        // 更新连线
        updatePolylines();

        // 更新点列表
        updatePointsList();
      }

      // 更新连线
      function updatePolylines() {
        // 清除所有连线
        polylines.forEach(polyline => {
          map.removeLayer(polyline);
        });
        polylines = [];

        // 如果有两个或以上点，创建连线
        if (points.length >= 2) {
          const polyline = L.polyline(points, {
            color: "#e74c3c",
            weight: 4,
            opacity: 0.7,
            smoothFactor: 1
          }).addTo(map);
          polylines.push(polyline);
        }
      }

      // 更新点列表
      function updatePointsList() {
        if (points.length === 0) {
          pointsList.innerHTML =
            '<div style="text-align: center; opacity: 0.7;">暂无标记点</div>';
          pointsPanel.style.display = "none";
          return;
        }

        pointsPanel.style.display = "block";
        pointsList.innerHTML = "";

        points.forEach((point, index) => {
          const pointItem = document.createElement("div");
          pointItem.className = "point-item";
          pointItem.innerHTML = `
            <div class="point-number">${index + 1}</div>
            纬度: ${point.lat.toFixed(6)}<br>
            经度: ${point.lng.toFixed(6)}
          `;
          pointsList.appendChild(pointItem);
        });
      }

      // 删除点
      function removePoint(index) {
        // 移除标记
        map.removeLayer(markers[index].main);
        map.removeLayer(markers[index].number);

        // 从数组中移除
        points.splice(index, 1);
        markers.splice(index, 1);

        // 重新编号剩余的点
        markers.forEach((marker, i) => {
          const newNumber = i + 1;
          marker.number.setIcon(
            L.divIcon({
              html: `<div style="background-color: #e74c3c; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white;">${newNumber}</div>`,
              className: "number-icon",
              iconSize: [24, 24],
              iconAnchor: [12, 12]
            })
          );

          marker.main.setPopupContent(`
            <b>标记点 ${newNumber}</b><br>
            纬度: ${points[i].lat.toFixed(6)}<br>
            经度: ${points[i].lng.toFixed(6)}<br>
            <button onclick="removePoint(${i})" style="margin-top: 5px; padding: 5px 10px; background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer;">删除此点</button>
          `);
        });

        // 更新连线
        updatePolylines();

        // 更新点列表
        updatePointsList();
      }

      // 清除所有点
      function clearAllPoints() {
        // 移除所有标记
        markers.forEach(marker => {
          map.removeLayer(marker.main);
          map.removeLayer(marker.number);
        });

        // 移除所有连线
        polylines.forEach(polyline => {
          map.removeLayer(polyline);
        });

        // 清空数组
        points = [];
        markers = [];
        polylines = [];

        // 更新点列表
        updatePointsList();
      }

      // 切换绘制模式
      toggleDrawingBtn.addEventListener("click", function() {
        isDrawing = !isDrawing;

        if (isDrawing) {
          this.textContent = "停止绘制";
          this.classList.add("active");
          drawingStatus.textContent = "绘制模式: 开启 - 点击地图添加标记点";
          drawingStatus.classList.add("active");
          map.getContainer().style.cursor = "crosshair";
        } else {
          this.textContent = "开始绘制";
          this.classList.remove("active");
          drawingStatus.textContent = "绘制模式: 关闭";
          drawingStatus.classList.remove("active");
          map.getContainer().style.cursor = "";
        }
      });

      // 清除标记点
      clearPointsBtn.addEventListener("click", clearAllPoints);

      // 添加控制按钮功能
      document.getElementById("zoom-in").addEventListener("click", () => {
        map.zoomIn();
      });

      document.getElementById("zoom-out").addEventListener("click", () => {
        map.zoomOut();
      });

      document.getElementById("reset-view").addEventListener("click", () => {
        map.setView([30.745482638228058, 106.03737831115724], 15);
      });

      document
        .getElementById("toggle-satellite")
        .addEventListener("click", () => {
          if (isSatellite) {
            map.removeLayer(satelliteLayer);
            map.addLayer(osmLayer);
            isSatellite = false;
          } else {
            map.removeLayer(osmLayer);
            map.addLayer(satelliteLayer);
            isSatellite = true;
          }
        });

      // 添加自定义缩放控件
      L.control
        .zoom({
          position: "topright"
        })
        .addTo(map);

      // 添加比例尺
      L.control
        .scale({
          imperial: false,
          position: "bottomleft"
        })
        .addTo(map);

      // 响应窗口大小变化，保持地图正确显示
      window.addEventListener("resize", () => {
        map.invalidateSize();
      });

      // 使removePoint函数在全局可访问
      window.removePoint = removePoint;
    </script>
  </body>
</html>
