<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapLibre 南充 3D 演示</title>
    <!-- 引入 MapLibre -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        .info {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 6px 18px;
            border-radius: 20px; font-size: 14px; z-index: 1000;
            pointer-events: none; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info">MapLibre · 南充市 3D 立体建筑（倾斜 60°）</div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            // 使用 OpenStreetMap 栅格样式（开源，无需 token）
            style: {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '© OpenStreetMap',
                    },
                },
                layers: [{
                    id: 'osm-layer',
                    type: 'raster',
                    source: 'osm',
                }],
            },
            center: [106.110565, 30.837235],
            zoom: 14,
            pitch: 60,    // 俯仰角 60°
            bearing: 30,  // 旋转 30°
        });

        map.on('load', () => {
            map.addControl(new maplibregl.NavigationControl(), 'top-left');

            // ---------- 生成模拟的 3D 建筑（在南充市区随机分布） ----------
            // 围绕市中心生成 6 个矩形建筑，赋予高度
            const buildings = [];
            const offsets = [
                { lng: 0.01, lat: 0.01, h: 80 },
                { lng: -0.015, lat: 0.008, h: 120 },
                { lng: 0.008, lat: -0.012, h: 60 },
                { lng: -0.02, lat: -0.015, h: 100 },
                { lng: 0.02, lat: -0.005, h: 90 },
                { lng: -0.005, lat: 0.02, h: 70 },
            ];
            const baseLon = 106.110565;
            const baseLat = 30.837235;
            offsets.forEach((o) => {
                const lon = baseLon + o.lng;
                const lat = baseLat + o.lat;
                // 每个建筑为一个矩形（近似正方形）
                const size = 0.003; // 约 300 米
                const coords = [
                    [lon - size, lat - size],
                    [lon + size, lat - size],
                    [lon + size, lat + size],
                    [lon - size, lat + size],
                    [lon - size, lat - size],
                ];
                buildings.push({
                    type: 'Feature',
                    geometry: { type: 'Polygon', coordinates: [coords] },
                    properties: { height: o.h, min_height: 0 },
                });
            });

            map.addSource('buildings', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: buildings },
            });

            map.addLayer({
                id: '3d-buildings',
                type: 'fill-extrusion',
                source: 'buildings',
                paint: {
                    'fill-extrusion-color': '#3b8fc2',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.85,
                },
            });

            // 添加建筑边框（增强立体感）
            map.addLayer({
                id: 'buildings-outline',
                type: 'fill-extrusion',
                source: 'buildings',
                paint: {
                    'fill-extrusion-color': '#ffffff',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.2,
                },
            });

            // 添加一个中心标记
            new maplibregl.Marker({ color: '#ff4d4d' })
                .setLngLat([106.110565, 30.837235])
                .addTo(map);
        });
    </script>
</body>
</html>
