<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>四川省地图 - Leaflet离线展示</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a6c2a, #1f7ab2, #2dfdc9);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 30px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        backdrop-filter: blur(5px);
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }

      .description {
        font-size: 1.1rem;
        max-width: 800px;
        margin: 0 auto;
        line-height: 1.6;
      }

      .map-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* 16:9 宽高比 (9/16 = 0.5625) */
        background-color: #1e3c2c;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        margin-bottom: 30px;
      }

      #map {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 15px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      button {
        padding: 12px 25px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
      }

      button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      .info-panel {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        border-radius: 10px;
        margin-top: 20px;
        backdrop-filter: blur(5px);
      }

      .info-panel h2 {
        margin-bottom: 15px;
        text-align: center;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
      }

      .feature {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 8px;
      }

      .feature h3 {
        margin-bottom: 10px;
        color: #2dfdc9;
      }

      footer {
        margin-top: 30px;
        text-align: center;
        padding: 20px;
        font-size: 0.9rem;
        opacity: 0.8;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .description {
          font-size: 1rem;
        }

        .controls {
          flex-direction: column;
          align-items: center;
        }

        button {
          width: 100%;
          max-width: 300px;
        }
      }

      /* 自定义Leaflet控件样式 */
      .leaflet-control-zoom a {
        background: rgba(0, 0, 0, 0.6) !important;
        color: white !important;
        border: none !important;
      }

      .leaflet-control-zoom a:hover {
        background: rgba(0, 0, 0, 0.8) !important;
      }

      .leaflet-control-scale-line {
        background: rgba(0, 0, 0, 0.6) !important;
        color: white !important;
        border: none !important;
      }

      .map-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        background: rgba(0, 0, 0, 0.7);
        padding: 20px 30px;
        border-radius: 10px;
        color: white;
        font-size: 1.2rem;
      }

      .sichuan-area {
        background-color: #2e8b57 !important;
        border: 2px solid #1e6b47 !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>四川省地图展示</h1>
        <p class="description">
          此页面展示四川省地图，中心点为南充市。地图容器始终保持16:9的宽高比，四川省区域使用特殊颜色标识。
        </p>
      </header>

      <div class="map-container">
        <div id="map"></div>
        <div class="map-loading" id="loading">地图加载中...</div>
      </div>

      <div class="controls">
        <button id="zoom-in">放大</button>
        <button id="zoom-out">缩小</button>
        <button id="reset-view">重置视图</button>
        <button id="toggle-satellite">切换地图样式</button>
      </div>

      <div class="info-panel">
        <h2>四川省简介</h2>
        <div class="features">
          <div class="feature">
            <h3>地理位置</h3>
            <p>四川省位于中国西南地区，地处长江上游，素有"天府之国"的美誉。</p>
          </div>
          <div class="feature">
            <h3>行政区划</h3>
            <p>
              四川省下辖18个地级市、3个自治州，其中包括成都市、南充市等重要城市。
            </p>
          </div>
          <div class="feature">
            <h3>自然资源</h3>
            <p>
              四川拥有丰富的自然资源，包括大熊猫栖息地、九寨沟、峨眉山等著名景点。
            </p>
          </div>
          <div class="feature">
            <h3>人口与经济</h3>
            <p>
              四川是中国人口大省之一，经济总量位居西部前列，以电子信息、装备制造等产业为主。
            </p>
          </div>
        </div>
      </div>

      <footer>
        <p>© 2023 四川省地图演示 | 使用Leaflet.js库</p>
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // 初始化地图
      const map = L.map("map", {
        center: [30.745482638228058, 106.03737831115724], // 南充市坐标
        zoom: 8,
        zoomControl: false, // 隐藏默认的缩放控件
        fadeAnimation: false,
        zoomAnimation: false
      });

      // 设置地图初始背景色
      const mapElement = document.getElementById("map");
      mapElement.style.backgroundColor = "#1e3c2c"; // 深绿色背景

      // 创建自定义离线瓦片图层
      const offlineTiles = L.tileLayer("", {
        minZoom: 0,
        maxZoom: 18,
        tileSize: 256,
        opacity: 0.8
      });

      // 创建彩色网格瓦片（模拟离线地图）
      offlineTiles.createTile = function(coords) {
        const tile = document.createElement("canvas");
        tile.width = tile.height = 256;
        const ctx = tile.getContext("2d");

        // 计算当前瓦片对应的经纬度范围
        const n = 180 - (coords.y / Math.pow(2, coords.z)) * 360;
        const lng = n - 180;
        const lat = (coords.x / Math.pow(2, coords.z)) * 360 - 90;

        // 判断是否在四川省范围内（简化判断）
        const isInSichuan =
          lng >= 97.0 && lng <= 110.0 && lat >= 26.0 && lat <= 34.5;

        // 如果在四川省范围内，使用特殊颜色
        if (isInSichuan) {
          // 四川省区域使用绿色系
          ctx.fillStyle = "#2e8b57"; // 海绿色
          ctx.fillRect(0, 0, 256, 256);

          // 添加纹理
          ctx.strokeStyle = "rgba(46, 139, 87, 0.7)";
          ctx.lineWidth = 1;
          for (let i = 0; i < 256; i += 16) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, 256);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(256, i);
            ctx.stroke();
          }

          // 添加四川省标识
          ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
          ctx.font = "bold 16px Arial";
          ctx.fillText("四川", 100, 130);
        } else {
          // 其他区域使用默认颜色
          const colors = ["#4682b4", "#5f9ea0", "#6495ed", "#6a5acd"];
          const color = colors[(coords.x + coords.y) % colors.length];

          ctx.fillStyle = color;
          ctx.fillRect(0, 0, 256, 256);
        }

        // 绘制网格线
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 1;
        ctx.strokeRect(0, 0, 256, 256);

        // 绘制坐标文本
        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(`x:${coords.x} y:${coords.y} z:${coords.z}`, 10, 20);

        // 绘制经纬度信息
        ctx.fillText(`经度: ${lng.toFixed(2)}`, 10, 40);
        ctx.fillText(`纬度: ${lat.toFixed(2)}`, 10, 60);

        return tile;
      };

      // 添加离线地图图层
      offlineTiles.addTo(map);

      // 添加卫星图层选项
      const satelliteLayer = L.tileLayer("./light/{z}/{x}/{y}.png", {
        attribution:
          "Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community",
        maxZoom: 18
      });

      // 当前图层状态
      let isSatellite = false;

      // 添加控制按钮功能
      document.getElementById("zoom-in").addEventListener("click", () => {
        map.zoomIn();
      });

      document.getElementById("zoom-out").addEventListener("click", () => {
        map.zoomOut();
      });

      document.getElementById("reset-view").addEventListener("click", () => {
        map.setView([30.745482638228058, 106.03737831115724], 8);
      });

      document
        .getElementById("toggle-satellite")
        .addEventListener("click", () => {
          if (isSatellite) {
            map.removeLayer(satelliteLayer);
            map.addLayer(offlineTiles);
            isSatellite = false;
            document.getElementById("toggle-satellite").textContent =
              "切换卫星图";
          } else {
            map.removeLayer(offlineTiles);
            map.addLayer(satelliteLayer);
            isSatellite = true;
            document.getElementById("toggle-satellite").textContent =
              "切换离线图";
          }
        });

      // 添加自定义缩放控件
      L.control
        .zoom({
          position: "topright"
        })
        .addTo(map);

      // 添加比例尺
      L.control
        .scale({
          imperial: false,
          position: "bottomleft"
        })
        .addTo(map);

      // 添加四川省主要城市标记
      const cities = [
        { name: "南充市", coords: [30.745482638228058, 106.03737831115724] },
        { name: "成都市", coords: [30.5728, 104.0668] },
        { name: "绵阳市", coords: [31.4672, 104.6791] },
        { name: "德阳市", coords: [31.1304, 104.402] },
        { name: "乐山市", coords: [29.5522, 103.7654] },
        { name: "宜宾市", coords: [28.7517, 104.6432] },
        { name: "泸州市", coords: [28.8717, 105.4433] },
        { name: "达州市", coords: [31.2096, 107.468] }
      ];

      cities.forEach(city => {
        const marker = L.marker(city.coords).addTo(map);
        marker.bindPopup(`<b>${city.name}</b>`);

        // 为南充市添加特殊标记
        if (city.name === "南充市") {
          marker.bindPopup(`<b>${city.name}</b><br>地图中心点`).openPopup();

          // 添加圆形区域标记
          const circle = L.circle(city.coords, {
            color: "red",
            fillColor: "#f03",
            fillOpacity: 0.1,
            radius: 20000
          }).addTo(map);
        }
      });

      // 响应窗口大小变化，保持地图正确显示
      window.addEventListener("resize", () => {
        map.invalidateSize();
      });

      // 模拟地图加载完成
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
      }, 1500);
    </script>
  </body>
</html>
