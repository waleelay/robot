<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>移动点标记演示</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 30px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        backdrop-filter: blur(5px);
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }

      .description {
        font-size: 1.1rem;
        max-width: 800px;
        margin: 0 auto;
        line-height: 1.6;
      }

      .map-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        background-color: #2c3e50;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        margin-bottom: 30px;
      }

      #map {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 15px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      button {
        padding: 12px 25px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
      }

      button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      button.active {
        background: rgba(46, 204, 113, 0.6);
      }

      .info-panel {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        border-radius: 10px;
        margin-top: 20px;
        backdrop-filter: blur(5px);
      }

      .info-panel h2 {
        margin-bottom: 15px;
        text-align: center;
      }

      .status-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        border-radius: 8px;
        z-index: 1000;
        min-width: 200px;
      }

      .point-info {
        margin: 8px 0;
        padding: 5px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      .point-a {
        border-left: 3px solid #e74c3c;
      }

      .point-b {
        border-left: 3px solid #3498db;
      }

      .coordinates {
        font-family: monospace;
        font-size: 0.9rem;
        color: #fdbb2d;
      }

      .movement-path {
        stroke-dasharray: 5, 5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>移动点标记演示</h1>
        <p class="description">
          在地图上标记A点（红色，可移动）和B点（蓝色，固定），A点每隔一秒钟自动移动位置
        </p>
      </header>

      <div class="map-container">
        <div id="map"></div>
        <div class="status-panel">
          <h3>点状态信息</h3>
          <div class="point-info point-a">
            <strong>A点 (移动点)</strong>
            <div class="coordinates" id="pointA-coords">纬度: --, 经度: --</div>
          </div>
          <div class="point-info point-b">
            <strong>B点 (固定点)</strong>
            <div class="coordinates" id="pointB-coords">纬度: --, 经度: --</div>
          </div>
          <div class="point-info">
            <strong>距离:</strong>
            <div class="coordinates" id="distance-info">-- 米</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="start-movement">开始移动</button>
        <button id="stop-movement">停止移动</button>
        <button id="reset-points">重置点位置</button>
        <button id="toggle-path">显示移动轨迹</button>
        <button id="set-pointB">设置B点位置</button>
      </div>

      <div class="info-panel">
        <h2>功能说明</h2>
        <div class="features">
          <div class="feature">
            <h3>点标记</h3>
            <p>A点为红色移动点，B点为蓝色固定点</p>
          </div>
          <div class="feature">
            <h3>自动移动</h3>
            <p>A点每隔1秒自动移动，模拟动态位置更新</p>
          </div>
          <div class="feature">
            <h3>实时距离</h3>
            <p>实时计算并显示A点和B点之间的距离</p>
          </div>
          <div class="feature">
            <h3>移动轨迹</h3>
            <p>可显示A点的移动轨迹路径</p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // 初始化地图
      const map = L.map("map", {
        center: [30.745482638228058, 106.03737831115724],
        zoom: 15,
        zoomControl: false,
      });

      // 添加离线地图图层
      const osmLayer = L.tileLayer("./black/{z}/{x}/{y}.png", {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18
      }).addTo(map);

      // 点标记和状态变量
      let pointA = null;
      let pointB = null;
      let pointAMarker = null;
      let pointBMarker = null;
      let movementInterval = null;
      let isMoving = false;
      let movementPath = null;
      let pathPoints = [];

      // 创建自定义图标
      const pointAIcon = L.divIcon({
        html: `<div style="background-color: #e74c3c; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">A</div>`,
        className: 'point-a-icon',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });

      const pointBIcon = L.divIcon({
        html: `<div style="background-color: #3498db; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">B</div>`,
        className: 'point-b-icon',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });

      // 初始化点位置
      function initializePoints() {
        // 清除现有标记
        if (pointAMarker) map.removeLayer(pointAMarker);
        if (pointBMarker) map.removeLayer(pointBMarker);
        if (movementPath) map.removeLayer(movementPath);

        // 设置初始位置
        pointA = L.latLng(30.745482638228058, 106.03737831115724);
        pointB = L.latLng(30.748000, 106.040000);

        // 创建标记
        pointAMarker = L.marker(pointA, {
          icon: pointAIcon,
          zIndexOffset: 1000
        }).addTo(map);

        pointBMarker = L.marker(pointB, {
          icon: pointBIcon,
          zIndexOffset: 900
        }).addTo(map);

        // 初始化移动轨迹
        pathPoints = [pointA];
        movementPath = L.polyline(pathPoints, {
          color: '#e74c3c',
          weight: 3,
          opacity: 0.6,
          className: 'movement-path'
        }).addTo(map);

        // 绑定弹出窗口
        pointAMarker.bindPopup(`
          <b>A点 (移动点)</b><br>
          纬度: ${pointA.lat.toFixed(6)}<br>
          经度: ${pointA.lng.toFixed(6)}<br>
          状态: ${isMoving ? '移动中' : '静止'}
        `);

        pointBMarker.bindPopup(`
          <b>B点 (固定点)</b><br>
          纬度: ${pointB.lat.toFixed(6)}<br>
          经度: ${pointB.lng.toFixed(6)}
        `);

        // 更新状态显示
        updateStatusDisplay();
      }

      // 移动点A的位置
      function movePointA() {
        if (!pointA || !pointAMarker) return;

        // 生成随机移动方向和小距离
        const randomLat = (Math.random() - 0.5) * 0.001; // 约100米范围内的随机移动
        const randomLng = (Math.random() - 0.5) * 0.001;

        // 更新点A位置
        pointA = L.latLng(
          pointA.lat + randomLat,
          pointA.lng + randomLng
        );

        // 移动标记
        pointAMarker.setLatLng(pointA);

        // 更新移动轨迹
        pathPoints.push(pointA);
        movementPath.setLatLngs(pathPoints);

        // 更新弹出窗口
        pointAMarker.setPopupContent(`
          <b>A点 (移动点)</b><br>
          纬度: ${pointA.lat.toFixed(6)}<br>
          经度: ${pointA.lng.toFixed(6)}<br>
          状态: 移动中<br>
          移动次数: ${pathPoints.length}
        `);

        // 更新状态显示
        updateStatusDisplay();
      }

      // 更新状态显示
      function updateStatusDisplay() {
        if (pointA) {
          document.getElementById('pointA-coords').textContent =
            `纬度: ${pointA.lat.toFixed(6)}, 经度: ${pointA.lng.toFixed(6)}`;
        }

        if (pointB) {
          document.getElementById('pointB-coords').textContent =
            `纬度: ${pointB.lat.toFixed(6)}, 经度: ${pointB.lng.toFixed(6)}`;
        }

        // 计算并显示距离
        if (pointA && pointB) {
          const distance = map.distance(pointA, pointB).toFixed(2);
          document.getElementById('distance-info').textContent = `${distance} 米`;
        }
      }

      // 开始移动
      function startMovement() {
        if (isMoving) return;

        isMoving = true;
        document.getElementById('start-movement').classList.add('active');
        document.getElementById('stop-movement').classList.remove('active');

        movementInterval = setInterval(movePointA, 1000); // 每秒移动一次
      }

      // 停止移动
      function stopMovement() {
        if (!isMoving) return;

        isMoving = false;
        document.getElementById('start-movement').classList.remove('active');
        document.getElementById('stop-movement').classList.add('active');

        if (movementInterval) {
          clearInterval(movementInterval);
          movementInterval = null;
        }

        // 更新A点弹出窗口状态
        if (pointAMarker) {
          pointAMarker.setPopupContent(`
            <b>A点 (移动点)</b><br>
            纬度: ${pointA.lat.toFixed(6)}<br>
            经度: ${pointA.lng.toFixed(6)}<br>
            状态: 静止<br>
            移动次数: ${pathPoints.length}
          `);
        }
      }

      // 切换移动轨迹显示
      function togglePath() {
        if (movementPath) {
          if (map.hasLayer(movementPath)) {
            map.removeLayer(movementPath);
            document.getElementById('toggle-path').classList.remove('active');
          } else {
            movementPath.addTo(map);
            document.getElementById('toggle-path').classList.add('active');
          }
        }
      }

      // 设置B点位置（通过地图点击）
      function setPointBOnClick() {
        const button = document.getElementById('set-pointB');
        const wasActive = button.classList.contains('active');

        // 移除所有现有的事件监听器
        map.off('click');

        if (!wasActive) {
          button.classList.add('active');
          button.textContent = '点击地图设置B点';

          map.on('click', function(e) {
            pointB = e.latlng;
            pointBMarker.setLatLng(pointB);

            pointBMarker.setPopupContent(`
              <b>B点 (固定点)</b><br>
              纬度: ${pointB.lat.toFixed(6)}<br>
              经度: ${pointB.lng.toFixed(6)}
            `);

            updateStatusDisplay();

            // 完成设置后关闭模式
            button.classList.remove('active');
            button.textContent = '设置B点位置';
            map.off('click');
          });
        } else {
          button.classList.remove('active');
          button.textContent = '设置B点位置';
        }
      }

      // 事件监听
      document.getElementById('start-movement').addEventListener('click', startMovement);
      document.getElementById('stop-movement').addEventListener('click', stopMovement);
      document.getElementById('reset-points').addEventListener('click', initializePoints);
      document.getElementById('toggle-path').addEventListener('click', togglePath);
      document.getElementById('set-pointB').addEventListener('click', setPointBOnClick);

      // 添加自定义缩放控件
      L.control.zoom({
        position: "topright"
      }).addTo(map);

      // 添加比例尺
      L.control.scale({
        imperial: false,
        position: "bottomleft"
      }).addTo(map);

      // 初始化
      initializePoints();

      // 响应窗口大小变化
      window.addEventListener("resize", () => {
        map.invalidateSize();
      });
    </script>
  </body>
</html>
