spring:
  application:
    name: robot-mediaserver
  profiles:
    # 当前启用的 Spring Profile，默认使用开发环境。
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  # Media Service HTTP 服务端口。
  port: ${SERVER_PORT:8088}

media:
  livekit:
    # LiveKit WebSocket 连接地址，浏览器和服务端签发 Token 时使用。
    url: ${LIVEKIT_URL:ws://livekit-server:7880}
    # LiveKit API Key，用于服务端管理 Room、Token、Egress。
    api-key: ${LIVEKIT_API_KEY:devkey}
    # LiveKit API Secret，用于服务端签发访问 Token。
    api-secret: ${LIVEKIT_API_SECRET:dev-secret-dev-secret-dev-secret-32}
    # LiveKit 访问 Token 有效期，单位秒。
    token-ttl-seconds: ${LIVEKIT_TOKEN_TTL_SECONDS:600}
    # 是否启用 LiveKit Room 管理 API。
    room-api-enabled: ${LIVEKIT_ROOM_API_ENABLED:true}
    # 是否启用 LiveKit Egress 录制能力。
    egress-enabled: ${LIVEKIT_EGRESS_ENABLED:true}
    # Egress HLS 分片时长，单位秒。
    egress-segment-duration-seconds: ${LIVEKIT_EGRESS_SEGMENT_DURATION_SECONDS:6}
    # Egress 写入 S3/MinIO 时使用的区域。
    egress-s3-region: ${LIVEKIT_EGRESS_S3_REGION:us-east-1}
    # 是否对 S3/MinIO 使用 path-style 访问方式。
    egress-s3-force-path-style: ${LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE:true}
    # LiveKit Room 空房后自动清理等待时间，单位秒。
    room-empty-timeout-seconds: ${LIVEKIT_ROOM_EMPTY_TIMEOUT_SECONDS:60}
    # LiveKit 参与者离开后的保留等待时间，单位秒。
    room-departure-timeout-seconds: ${LIVEKIT_ROOM_DEPARTURE_TIMEOUT_SECONDS:20}
  minio:
    # MinIO/S3 对象存储访问地址。
    endpoint: ${MINIO_ENDPOINT:http://host.docker.internal:9000}
    # MinIO/S3 访问 Key。
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    # MinIO/S3 访问 Secret。
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    # 媒体文件存储桶名称。
    bucket: ${MINIO_BUCKET:robot-media}
    # 是否启用对象存储能力。
    enabled: ${MINIO_ENABLED:true}
  file:
    # 是否启用媒体文件上传、播放、转码等能力。
    enabled: ${MEDIA_FILE_ENABLED:true}
    # 简单上传最大文件大小，单位字节。
    simple-upload-max-bytes: ${MEDIA_FILE_SIMPLE_UPLOAD_MAX_BYTES:20971520}
    # 单个媒体文件允许的最大大小，单位字节。
    max-file-size-bytes: ${MEDIA_FILE_MAX_FILE_SIZE_BYTES:21474836480}
    # 分片上传的单片大小，单位字节。
    part-size-bytes: ${MEDIA_FILE_PART_SIZE_BYTES:16777216}
    # 单次最多返回的分片上传 URL 数量。
    max-part-urls-per-request: ${MEDIA_FILE_MAX_PART_URLS_PER_REQUEST:16}
    # 初始化分片上传时默认预签发的分片 URL 数量。
    initial-part-url-count: ${MEDIA_FILE_INITIAL_PART_URL_COUNT:16}
    # 上传预签名 URL 有效期，单位秒。
    upload-url-ttl-seconds: ${MEDIA_FILE_UPLOAD_URL_TTL_SECONDS:900}
    # 未完成分片上传的过期时间，单位小时。
    multipart-expire-hours: ${MEDIA_FILE_MULTIPART_EXPIRE_HOURS:72}
    # 播放 URL 有效期，单位秒。
    play-url-ttl-seconds: ${MEDIA_FILE_PLAY_URL_TTL_SECONDS:3600}
    # 播放 Token 签名密钥，生产环境需替换为安全密钥。
    play-token-secret: ${MEDIA_FILE_PLAY_TOKEN_SECRET:file-playback-development-secret-change-me}
    # HLS 转码使用的 ffmpeg 可执行文件路径。
    hls-ffmpeg-path: ${MEDIA_FILE_HLS_FFMPEG_PATH:${FFMPEG_PATH:ffmpeg}}
    # 媒体探测使用的 ffprobe 可执行文件路径。
    ffprobe-path: ${MEDIA_FILE_FFPROBE_PATH:${FFPROBE_PATH:ffprobe}}
    # HLS 转码分片时长，单位秒。
    hls-segment-duration-seconds: ${MEDIA_FILE_HLS_SEGMENT_DURATION_SECONDS:6}
    # 单个机器人允许同时进行的上传任务数量。
    max-active-uploads-per-robot: ${MEDIA_FILE_MAX_ACTIVE_UPLOADS_PER_ROBOT:2}
    # 全局允许同时进行的上传任务数量。
    max-active-uploads-global: ${MEDIA_FILE_MAX_ACTIVE_UPLOADS_GLOBAL:50}
    # HLS 转码工作线程并发数。
    hls-worker-concurrency: ${MEDIA_FILE_HLS_WORKER_CONCURRENCY:2}
    # HLS 转码任务租约时间，单位秒。
    hls-processing-lease-seconds: ${MEDIA_FILE_HLS_PROCESSING_LEASE_SECONDS:300}
    # 媒体文件默认保留天数。
    retention-days: ${MEDIA_FILE_RETENTION_DAYS:30}
    # 是否信任机器人侧内网直传来源。
    trusted-robot-network-enabled: ${MEDIA_FILE_TRUSTED_ROBOT_NETWORK_ENABLED:false}
    # 受信任机器人网络 CIDR 列表，多个值用逗号分隔。
    trusted-robot-cidrs: ${MEDIA_FILE_TRUSTED_ROBOT_CIDRS:127.0.0.1/32,::1/128}
    # 文件归属的默认组织 ID。
    default-org-id: ${MEDIA_FILE_DEFAULT_ORG_ID:org001}
  tts:
    # 是否启用文本转语音能力。
    enabled: ${TTS_ENABLED:true}
    # TTS 引擎 HTTP 接口地址。
    engine-url: ${TTS_ENGINE_URL:http://tts:5050/api/tts}
    # 默认 TTS 声音或模型标识。
    voice: ${TTS_VOICE:coqui-tts:zh_baker}
    # TTS 输出音频格式。
    format: ${TTS_FORMAT:wav}
    # TTS 生成文件的本地输出目录。
    output-root: ${TTS_OUTPUT_ROOT:/tmp/robot-media/tts}
    # TTS 引擎连接超时时间，单位毫秒。
    connect-timeout-ms: ${TTS_CONNECT_TIMEOUT_MS:5000}
    # TTS 引擎读取超时时间，单位毫秒。
    read-timeout-ms: ${TTS_READ_TIMEOUT_MS:30000}
    # 单次 TTS 请求允许的最大文本长度。
    max-text-length: ${TTS_MAX_TEXT_LENGTH:1000}
    # TTS 生成锁等待超时时间，单位秒。
    generate-lock-timeout-seconds: ${TTS_GENERATE_LOCK_TIMEOUT_SECONDS:30}
    # WAV 文件头偏移字节数，用于音频数据处理。
    wav-header-offset: ${TTS_WAV_HEADER_OFFSET:44}
  session:
    # 等待机器人发布视频 Track 的超时时间，单位秒。
    track-publish-timeout-seconds: ${TRACK_PUBLISH_TIMEOUT_SECONDS:20}
    # 中断会话自动恢复前的宽限时间，单位秒。
    interrupted-grace-seconds: ${INTERRUPTED_GRACE_SECONDS:15}
    # 会话进入空闲等待后自动释放的延迟时间，单位秒。
    idle-release-delay-seconds: ${IDLE_RELEASE_DELAY_SECONDS:600}
    # 观看者心跳超时时间，单位秒。
    viewer-heartbeat-timeout-seconds: ${VIEWER_HEARTBEAT_TIMEOUT_SECONDS:15}
    # 视频墙允许同时打开的最大视频流数量。
    max-video-wall-streams: ${MAX_VIDEO_WALL_STREAMS:16}
    # 详情页允许请求的最高视频分辨率。
    max-detail-resolution: ${MAX_DETAIL_RESOLUTION:2K}
