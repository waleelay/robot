spring:
  application:
    name: robot-mediaserver
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8088}

control:
  media-service-base-url: ${MEDIA_SERVICE_BASE_URL:http://localhost:8088}

media:
  auth:
    mock-enabled: true
  livekit:
    url: ${LIVEKIT_URL:ws://192.168.124.77:7880}
    api-key: ${LIVEKIT_API_KEY:devkey}
    api-secret: ${LIVEKIT_API_SECRET:dev-secret-dev-secret-dev-secret-32}
    token-ttl-seconds: ${LIVEKIT_TOKEN_TTL_SECONDS:600}
    room-api-enabled: ${LIVEKIT_ROOM_API_ENABLED:true}
    egress-enabled: ${LIVEKIT_EGRESS_ENABLED:true}
    egress-segment-duration-seconds: ${LIVEKIT_EGRESS_SEGMENT_DURATION_SECONDS:6}
    egress-s3-region: ${LIVEKIT_EGRESS_S3_REGION:us-east-1}
    egress-s3-force-path-style: ${LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE:true}
    room-empty-timeout-seconds: ${LIVEKIT_ROOM_EMPTY_TIMEOUT_SECONDS:60}
    room-departure-timeout-seconds: ${LIVEKIT_ROOM_DEPARTURE_TIMEOUT_SECONDS:20}
  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://192.168.124.77:1883}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    client-id: ${MQTT_CLIENT_ID:robot-mediaserver}
    enabled: ${MQTT_ENABLED:true}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://192.168.124.77:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:robot-media}
    enabled: ${MINIO_ENABLED:true}
  rtsp:
    ffprobe-path: ${FFPROBE_PATH:ffprobe}
    default-url: ${RTSP_DEFAULT_URL:rtsp://admin:okwy1688.@192.168.1.64:554/Streaming/Channels/101}
    timeout-ms: ${RTSP_PROBE_TIMEOUT_MS:8000}
  robot:
    heartbeat-timeout-seconds: ${ROBOT_HEARTBEAT_TIMEOUT_SECONDS:15}
  snapshot-worker:
    enabled: ${SNAPSHOT_WORKER_ENABLED:true}
    ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
    fixed-delay-ms: ${SNAPSHOT_WORKER_FIXED_DELAY_MS:3000}
    timeout-ms: ${SNAPSHOT_WORKER_TIMEOUT_MS:10000}
  recording:
    enabled: ${RECORDING_ENABLED:true}
    max-file-size-bytes: ${RECORDING_MAX_FILE_SIZE_BYTES:21474836480}
    part-size-bytes: ${RECORDING_PART_SIZE_BYTES:16777216}
    max-part-urls-per-request: ${RECORDING_MAX_PART_URLS_PER_REQUEST:16}
    upload-url-ttl-seconds: ${RECORDING_UPLOAD_URL_TTL_SECONDS:900}
    upload-expire-hours: ${RECORDING_UPLOAD_EXPIRE_HOURS:72}
    upload-session-refresh-enabled: ${RECORDING_UPLOAD_SESSION_REFRESH_ENABLED:true}
    play-url-ttl-seconds: ${RECORDING_PLAY_URL_TTL_SECONDS:3600}
    play-token-secret: ${RECORDING_PLAY_TOKEN_SECRET:recording-playback-development-secret-change-me}
    hls-ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
    ffprobe-path: ${FFPROBE_PATH:ffprobe}
    hls-segment-duration-seconds: ${RECORDING_HLS_SEGMENT_DURATION_SECONDS:6}
    hls-worker-concurrency: ${RECORDING_HLS_WORKER_CONCURRENCY:2}
    hls-processing-lease-seconds: ${RECORDING_HLS_PROCESSING_LEASE_SECONDS:300}
    max-active-uploads-per-robot: ${RECORDING_MAX_ACTIVE_UPLOADS_PER_ROBOT:2}
    max-active-uploads-global: ${RECORDING_MAX_ACTIVE_UPLOADS_GLOBAL:50}
    retention-days: ${RECORDING_RETENTION_DAYS:30}
    trusted-robot-network-enabled: ${RECORDING_TRUSTED_ROBOT_NETWORK_ENABLED:false}
    trusted-robot-cidrs: ${RECORDING_TRUSTED_ROBOT_CIDRS:127.0.0.1/32,::1/128}
    default-org-id: ${RECORDING_DEFAULT_ORG_ID:org001}
  session:
    track-publish-timeout-seconds: ${TRACK_PUBLISH_TIMEOUT_SECONDS:20}
    interrupted-grace-seconds: ${INTERRUPTED_GRACE_SECONDS:15}
    idle-release-delay-seconds: ${IDLE_RELEASE_DELAY_SECONDS:600}
    viewer-heartbeat-timeout-seconds: ${VIEWER_HEARTBEAT_TIMEOUT_SECONDS:15}
    max-video-wall-streams: ${MAX_VIDEO_WALL_STREAMS:16}
    max-detail-resolution: ${MAX_DETAIL_RESOLUTION:2K}
