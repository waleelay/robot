spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://192.168.124.77:3306/robot_media?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    elasticsearch:
      repositories:
        enabled: false
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://192.168.124.77:9200}

logging:
  level:
    com.robot.mediaserver: debug
