spring:
  datasource:
    # 开发环境 MySQL 连接地址。
    url: ${MYSQL_URL:jdbc:mysql://192.168.124.77:3306/robot_media?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    # 开发环境 MySQL 用户名。
    username: ${MYSQL_USERNAME:root}
    # 开发环境 MySQL 密码。
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      # 开发环境 Redis 主机地址。
      host: ${REDIS_HOST:localhost}
      # 开发环境 Redis 端口。
      port: ${REDIS_PORT:6379}
    elasticsearch:
      repositories:
        enabled: false
  elasticsearch:
    # 开发环境 Elasticsearch 访问地址。
    uris: ${ELASTICSEARCH_URIS:http://192.168.124.77:9200}

logging:
  level:
    com.robot.mediaserver: debug
