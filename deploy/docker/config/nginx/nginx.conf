#user  nobody;
worker_processes  4;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
	worker_connections  1024;
}

# ====== 核心：必须包在 http {} 里面 ======
http {
	include       mime.types;
	default_type  application/octet-stream;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}

# ====== 原始项目后端 ======
	upstream robot_mediaserver_backend {
		server {{NGINX_MEDIA_SERVICE_UPSTREAM}};
	}

	upstream robot_bigscreen_bff {
		server {{NGINX_BIGSCREEN_BFF_UPSTREAM}};
	}

	upstream robot_mediaserver_livekit {
		server {{NGINX_LIVEKIT_UPSTREAM}};
	}

# ====== 测试项目后端（端口加 2） ======
	upstream robot_mediaserver_backend_test {
		server {{NGINX_MEDIA_SERVICE_TEST_UPSTREAM}};
	}

	upstream robot_bigscreen_bff_test {
		server {{NGINX_BIGSCREEN_BFF_TEST_UPSTREAM}};
	}

	upstream robot_mediaserver_livekit_test {
		server {{NGINX_LIVEKIT_TEST_UPSTREAM}};
	}

# ====== 原始项目 ======
	server {
		listen 4443 ssl;
		http2 on;
		server_name _;

		ssl_certificate /etc/nginx/ssl/server.crt;
		ssl_certificate_key /etc/nginx/ssl/server.key;
		ssl_protocols TLSv1.2 TLSv1.3;

		root /usr/share/nginx/html/dist;
		index index.html;

		location / {
			try_files $uri $uri/ /index.html;
		}
location /tdt/ {
                        alias /usr/share/nginx/html/tdt/;
# 尝试查找文件，如果不存在则返回404
                        try_files $uri $uri/ =404;
# 针对地图文件设置缓存（瓦片等地图数据建议缓存久一些）
                        location ~* \.(geojson|json|pbf|mvt|png|jpg|jpeg|svg|webp)$ {
                                expires 7d;
                                add_header Cache-Control "public, immutable";
                        }
                }
		location /api/ {
			proxy_pass http://robot_bigscreen_bff;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
		}

		location /ws/control {
			proxy_pass http://robot_bigscreen_bff;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
		}

		location /ws/media {
			proxy_pass http://robot_bigscreen_bff;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
		}

		location /ws/bigscreen {
			proxy_pass http://robot_bigscreen_bff;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
		}

		location ^~ /livekit/ {
			rewrite ^/livekit/(.*)$ /$1 break;
			proxy_pass http://robot_mediaserver_livekit;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
			proxy_send_timeout 3600s;
		}
	}

# ====== 测试项目 ======
	server {
		listen 24443 ssl;  # 使用 24443 端口
			http2 on;
		server_name _;

		ssl_certificate /etc/nginx/ssl/server.crt;
		ssl_certificate_key /etc/nginx/ssl/server.key;
		ssl_protocols TLSv1.2 TLSv1.3;

		root /usr/share/nginx/html/dist_test;  # 测试项目的静态文件路径
			index index.html;

		location / {
			try_files $uri $uri/ /index.html;
		}
		location /tdt/ {
			alias /usr/share/nginx/html/tdt/;
# 尝试查找文件，如果不存在则返回404
			try_files $uri $uri/ =404;
# 针对地图文件设置缓存（瓦片等地图数据建议缓存久一些）
			location ~* \.(geojson|json|pbf|mvt|png|jpg|jpeg|svg|webp)$ {
				expires 7d;
				add_header Cache-Control "public, immutable";
			}
		}

		location /api/ {
			proxy_pass http://robot_bigscreen_bff_test;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
		}

		location /ws/control {
			proxy_pass http://robot_bigscreen_bff_test;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
		}

		location /ws/media {
			proxy_pass http://robot_bigscreen_bff_test;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
		}

		location /ws/bigscreen {
			proxy_pass http://robot_bigscreen_bff_test;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
		}

		location ^~ /livekit/ {
			rewrite ^/livekit/(.*)$ /$1 break;
			proxy_pass http://robot_mediaserver_livekit_test;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
			proxy_read_timeout 3600s;
			proxy_send_timeout 3600s;
		}
	}

# ====== HTTP 重定向 ======
# 原始项目 HTTP -> HTTPS
	server {
		listen 80;
		server_name _;
		return 301 https://$host:{{NGINX_HTTPS_PORT}}$request_uri;
	}

# 测试项目 HTTP -> HTTPS
	server {
		listen 280;
		server_name _;
		return 301 https://$host:{{NGINX_ALT_HTTPS_PORT}}$request_uri;
	}
}
