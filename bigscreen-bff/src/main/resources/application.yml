server:
  # Bigscreen BFF HTTP 服务端口。
  port: ${BIGSCREEN_BFF_PORT:8090}

center:
  # 管理中心服务基础地址。
  manage-base-url: ${CENTER_MANAGE_BASE_URL:http://192.168.124.44:8081}
  # Control Service 基础地址。
  control-base-url: ${CENTER_CONTROL_BASE_URL:http://localhost:8082}
  # 旧版控制服务基础地址。
  v1-control-base-url: ${CENTER_V1_CONTROL_BASE_URL:http://192.168.124.44:8082}
  # Media Service 基础地址。
  media-base-url: ${CENTER_MEDIA_BASE_URL:http://localhost:8088}
  # Control Service WebSocket 地址。
  websocket-control-url: ${CENTER_CONTROL_WS_URL:ws://192.168.124.77:8082/ws/control}

statistics:
  report:
    # 统计报表文件存储目录。
    storage-dir: ${STATISTICS_REPORT_STORAGE_DIR:data/statistics-reports}

bigscreen:
  cors:
    # 大屏接口允许跨域访问的来源模式，多个值用逗号分隔。
    allowed-origin-patterns: ${BIGSCREEN_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:8080,http://127.0.0.1:8080,http://192.168.*.*:8080,https://192.168.124.77:4443}

spring:
  application:
    name: bigscreen-bff
